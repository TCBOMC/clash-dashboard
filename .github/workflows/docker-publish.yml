name: Build & Push Docker Image

# ── 触发条件 ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # 支持手动触发（GitHub Actions 页面 → Run workflow）
  workflow_dispatch:

# ── 环境变量 ─────────────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  # ⚠️ 改成你的 GitHub 用户名或组织名
  IMAGE_NAME: TCBOMC/clash-dashboard

jobs:
  # ── Job 1: 构建 + 推送到 ghcr.io ────────────────────────────────────────
  build-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push (ghcr.io)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Job 2: 构建 + 推送到 Docker Hub（需要手动配置 Secrets）───────────────
  build-dockerhub:
    runs-on: ubuntu-latest
    if: ${{ vars.DOCKER_HUB_USER != '' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKER_HUB_USER }}/clash-dashboard
            ${{ vars.DOCKER_HUB_USER }}/clash-dashboard-webui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push (Docker Hub)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
