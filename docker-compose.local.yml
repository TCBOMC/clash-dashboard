version: "3.9"

services:
  clash:
    image: ghcr.io/metacubex/mihomo:latest
    container_name: clash-core
    restart: unless-stopped
    volumes:
      - ./clash-config:/root/.config/clash
    ports:
      - "7890:7890"
      - "7891:7891"
      - "7892:7892"
    expose:
      - "9090"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - clash-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/proxies"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: tcobmc/clash-dashboard:local
    container_name: clash-dashboard
    restart: unless-stopped
    depends_on:
      clash:
        condition: service_healthy
    volumes:
      - ./clash-config:/clash-config
    ports:
      - "8080:8080"
    environment:
      - CLASH_API_BASE=http://clash:9090
      - CLASH_SECRET=${CLASH_SECRET:-}
      - CONFIG_DIR=/clash-config
      - TZ=Asia/Shanghai
    networks:
      - clash-net

networks:
  clash-net:
    driver: bridge
