# Clash Dashboard + Bundled Mihomo
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up          # bundled mihomo (自启动内核)
#   docker compose --f docker-compose.external.yml up  # 使用已有的外部 Clash
#
# Ports:
#   8080  Dashboard WebUI
#   9091  Mihomo RESTful API
#   7890  HTTP 代理
#   7891  SOCKS5 代理
# ─────────────────────────────────────────────────────────────────────────────

services:
  clash-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clash-dashboard
    restart: unless-stopped

    # Ports
    ports:
      - "8080:8080"    # Dashboard WebUI
      - "9091:9091"    # Mihomo RESTful API
      - "7890:7890"    # HTTP 代理
      - "7891:7891"    # SOCKS5 代理

    # Persist config across restarts
    volumes:
      - ./clash-config:/app/clash-config:rw

    # Environment variables (override with .env file)
    environment:
      - MIHOMO_API_PORT=9091
      - CLASH_API_URL=http://127.0.0.1:9091

    # Required for mihomo to redirect traffic
    cap_add:
      - NET_ADMIN

    network_mode: bridge
